name: release

# Publish to PyPI on a version tag (vX.Y.Z) via PyPI Trusted Publishing (OIDC — no stored API token).
#
# One-time setup on PyPI (before the first release): add a Trusted Publisher at
#   https://pypi.org/manage/account/publishing/
#     PyPI project: graphed-histogram   owner: graphed-org   repository: graphed-histogram
#     workflow: release.yml              environment: pypi
# A "pending publisher" can be configured before the project exists — the first OIDC publish then
# both claims the name and uploads, so the manual token upload is optional.
#
# Verify: under Trusted Publishing, pypa/gh-action-pypi-publish generates PEP 740 attestations
# (Sigstore-signed) and uploads them alongside each artifact — no API token or separate attest step
# needed. The provenance ties every file to this repo + workflow + commit.
#
# NOTE: bump the version in pyproject.toml before tagging — PyPI rejects re-uploading an existing
# version (0.0.1 may already be published).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: build wheel + sdist (pure Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build + validate metadata
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    name: publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC: authenticate to PyPI + sign PEP 740 attestations (no API token stored)
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          attestations: true # PEP 740 provenance (default under Trusted Publishing; explicit here)
