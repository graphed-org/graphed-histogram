# Read the Docs configuration — builds the `graphed-histogram` documentation.
# Mirrors the "docs (sphinx -W)" job in .github/workflows/ci.yml.
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
    # The `graphed` dependency is a maturin/PyO3 package built from git, so RTD needs cargo.
    rust: "latest"

python:
  install:
    # 1) the consolidated `graphed` package (not on PyPI) — pinned in docs/requirements.txt to match
    #    the CI docs job's env.GRAPHED.
    - requirements: docs/requirements.txt
    # 2) graphed-histogram itself + its docs toolchain (sphinx, furo). `graphed` is already satisfied
    #    by step 1, so pip does not try to fetch the bare `graphed` dependency from PyPI.
    - method: pip
      path: .
      extra_requirements:
        - docs

sphinx:
  configuration: docs/conf.py
